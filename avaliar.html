<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avaliar - Coffee Quality Challenge</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <header class="cabecalho">
    <nav class="barra-navegacao">
      <span class="logo">Coffee Quality</span>
      <ul class="links-navegacao">
        <li><a href="index.html">Início</a></li>
        <li><a href="cafes.html">Cafés</a></li>
        <li><a href="avaliar.html" class="ativo">Avaliar</a></li>
        <li><a href="ranking.html">Ranking</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1 class="titulo-pagina">Nova Avaliação</h1>

    <form id="formulario-avaliacao" class="formulario-avaliacao">

      <div class="grupo-formulario">
        <label for="cafe">Café:</label>
        <select id="cafe" name="cafe" required></select>
      </div>

      <div class="grupo-formulario">
        <label for="aroma">Aroma (0 a 10):</label>
        <input type="number" id="aroma" name="aroma" min="0" max="10" step="0.1" required>
      </div>

      <div class="grupo-formulario">
        <label for="docura">Doçura (0 a 10):</label>
        <input type="number" id="docura" name="docura" min="0" max="10" step="0.1" required>
      </div>

      <div class="grupo-formulario">
        <label for="acidez">Acidez (0 a 10):</label>
        <input type="number" id="acidez" name="acidez" min="0" max="10" step="0.1" required>
      </div>

      <div class="grupo-formulario">
        <label for="corpo">Corpo (0 a 10):</label>
        <input type="number" id="corpo" name="corpo" min="0" max="10" step="0.1" required>
      </div>

      <div class="grupo-formulario">
        <label for="finalizacao">Finalização (0 a 10):</label>
        <input type="number" id="finalizacao" name="finalizacao" min="0" max="10" step="0.1" required>
      </div>

      <button type="submit" class="botao">Salvar Avaliação</button>

      <p id="mensagem-avaliacao" class="mensagem escondido"></p>
    </form>
  </main>

  <footer class="rodape">
    <p>Coffee Quality Challenge - IFC</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
